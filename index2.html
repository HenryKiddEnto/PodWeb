<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parasitoid Pod</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            background-color: #fdfcf5;
            color: #333;
        }

        /* Layout container */
        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar styles */
        .sidebar {
            width: 280px;
            background-color: #404040;
            color: white;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        /* Logo container in sidebar */
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #CB7E29;
        }

        .logo-image {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            object-fit: cover;  /* Ensures image covers circle without distortion */
        }

        .site-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-align: center;
        }

        .site-title span {
            color: #CB7E29;
        }

        /* App buttons section */

        .apps-title {
            color: #bdc3c7;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .app-button {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 8px;
            background-color: #595959;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .app-button:hover {
            background-color: #CB7E29;
        }

        .app-button i {
            margin-right: 10px;
            font-size: 1.2rem;
        }

        /* Main content area */
        .main-content {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 80px); /* Full height minus some padding */
            width: 100%;
        }

        .video-title {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2rem;
            text-align: center;
        }

        /* Video wrapper for responsive 16:9 aspect ratio */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px; /* Maximum width of the video */
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-caption {
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 1.1rem;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        .highlight {
            background-color: #e7f3ff;
            padding: 20px;
            border-radius: 8px;
            border-left: 6px solid #CB7E29;
            margin-bottom: 30px;
        }

        h2 {
            color: #2c3e50;
            margin: 25px 0 15px 0;
        }

        ul {
            margin: 15px 0 25px 30px;
        }

        li {
            margin-bottom: 10px;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #CB7E29;
            text-align: center;
            color: #7f8c8d;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .main-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Logo Container -->
            <div class="logo-container">
                <img src="static/images/GryonIcon.png" alt="Site Logo" class="logo-image">

                <div class="site-title">
                    Parasitoid<span>Pod</span>
                </div>
            </div>
            <!-- Apps Section (Sidebar Buttons) -->
            <div class="apps-section">
                <div class="apps-title">Tools</div>
                <button class="app-button" onclick="alert('Calendar opened!')">
                    🐦‍🔥 Team Type Challenge
                </button>
                <button class="app-button" onclick="alert('Calculator opened!')">
                    🛞 Assorted Wheels
                </button>
                <button class="app-button" onclick="alert('Notes opened!')">
                    🎥 Video Notes
                </button>
                <button class="app-button" onclick="alert('Analytics opened!')">
                    🐝 Wasp Photos
                </button>
            </div>
            <div class="footer">
                <p>&copy; 2026 Henry Kidd</p>
            </div>
        </div>

        <div class="main-content">
            <div class="video-container">
                <h1 class="video-title">Featured Video</h1>
                <div class="video-wrapper">
                    <iframe
                        src="https://www.youtube.com/embed/YOUR_VIDEO_ID"
                        title="YouTube video player"
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen>
                    </iframe>
                </div>
                <!-- Optional: Add a simple caption -->
                <p class="video-caption">Your video description here</p>
            </div>
        </div>
    </div>
</body>
</html>
